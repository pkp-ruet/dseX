services:
  - type: web
    name: dsex-api
    env: python
    pythonVersion: "3.12.0"
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
